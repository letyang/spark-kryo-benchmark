# metrics.properties - Spark Metrics Configuration
# Location: Copy this to $SPARK_HOME/conf/metrics.properties
# Or pass via: --conf spark.metrics.conf=/path/to/metrics.properties

#############################################################
# Spark Metrics Configuration for Kryo Serialization Benchmark
#############################################################

# Enable CSV sink for metrics collection (saves to files)
*.sink.csv.class=org.apache.spark.metrics.sink.CsvSink
*.sink.csv.period=10
*.sink.csv.unit=seconds
*.sink.csv.directory=/tmp/spark-metrics

# Enable JMX sink for runtime monitoring (exposes via JMX)
*.sink.jmx.class=org.apache.spark.metrics.sink.JmxSink
*.sink.jmx.period=5
*.sink.jmx.unit=seconds

# Enable Slf4j sink for logging (prints to logs)
*.sink.slf4j.class=org.apache.spark.metrics.sink.Slf4jSink
*.sink.slf4j.period=5
*.sink.slf4j.unit=seconds

# Enable Console sink for debugging (prints to console)
# *.sink.console.class=org.apache.spark.metrics.sink.ConsoleSink
# *.sink.console.period=10
# *.sink.console.unit=seconds

#############################################################
# Sources - where metrics come from
#############################################################

# JVM source for GC and memory metrics
*.source.jvm.class=org.apache.spark.metrics.source.JvmSource

# Spark metrics source
*.source.spark.class=org.apache.spark.metrics.source.SparkSource

# Kryo metrics source (custom)
*.source.kryo.class=com.example.spark.monitoring.KryoMetricsSource

#############################################################
# Master instance (driver) specific settings
#############################################################

master.sink.csv.class=org.apache.spark.metrics.sink.CsvSink
master.sink.csv.period=5
master.sink.csv.unit=seconds
master.sink.csv.directory=/tmp/spark-metrics/master

master.source.jvm.class=org.apache.spark.metrics.source.JvmSource

#############################################################
# Worker instance (executor) specific settings
#############################################################

worker.sink.csv.class=org.apache.spark.metrics.sink.CsvSink
worker.sink.csv.period=5
worker.sink.csv.unit=seconds
worker.sink.csv.directory=/tmp/spark-metrics/worker

worker.source.jvm.class=org.apache.spark.metrics.source.JvmSource

#############################################################
# Driver specific settings
#############################################################

driver.sink.csv.class=org.apache.spark.metrics.sink.CsvSink
driver.sink.csv.period=5
driver.sink.csv.unit=seconds
driver.sink.csv.directory=/tmp/spark-metrics/driver

driver.source.jvm.class=org.apache.spark.metrics.source.JvmSource

#############################################################
# Executor specific settings
#############################################################

executor.sink.csv.class=org.apache.spark.metrics.sink.CsvSink
executor.sink.csv.period=5
executor.sink.csv.unit=seconds
executor.sink.csv.directory=/tmp/spark-metrics/executor

executor.source.jvm.class=org.apache.spark.metrics.source.JvmSource

#############################################################
# Custom metrics for Kryo serialization
#############################################################

# Enable Kryo-specific metrics if custom source is available
# executor.source.kryo.class=com.example.spark.monitoring.KryoMetricsSource

#############################################################
# How to use this file:
#############################################################
# 
# Option 1: Copy to Spark conf directory
#   cp metrics.properties $SPARK_HOME/conf/
#
# Option 2: Pass as Spark configuration
#   spark-submit --conf spark.metrics.conf=/path/to/metrics.properties ...
#
# Option 3: For EMR, add to cluster configuration
#   "Classification": "spark-defaults",
#   "Properties": {
#       "spark.metrics.conf": "/etc/spark/conf/metrics.properties"
#   }
#
# To view JMX metrics:
#   jconsole localhost:9092
#
# To export to Prometheus:
#   Use jmx_exporter with javaagent